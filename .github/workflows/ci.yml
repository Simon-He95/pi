name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  pack-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Pack check
        run: pnpm pack:check

      - name: Smoke install packed package
        shell: bash
        run: |
          TARBALL=$(npm pack --json | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input)[0].filename))")
          SMOKE_DIR=$(mktemp -d)
          cp "$TARBALL" "$SMOKE_DIR/"
          cd "$SMOKE_DIR"
          npm init -y
          npm install "./$TARBALL"
          npm install -D typescript
          for bin in pi pio pix pa pu pci pil pui prun pinit pbuild pfind; do
            ./node_modules/.bin/$bin --version >/dev/null
          done
          test -f node_modules/@simon_he/pi/dist/index.d.mts
          test -f node_modules/@simon_he/pi/dist/index.d.cts
          cat > import-smoke.mts <<'EOF'
          import { setup } from '@simon_he/pi'
          void setup
          EOF
          cat > require-smoke.cts <<'EOF'
          import pi = require('@simon_he/pi')
          void pi.setup
          EOF
          npx tsc --module nodenext --moduleResolution nodenext --target ES2022 --noEmit import-smoke.mts require-smoke.cts
          node --input-type=module -e "const { setup } = await import('@simon_he/pi'); if (typeof setup !== 'function') process.exit(1)"
          node -e "const { setup } = require('@simon_he/pi'); if (typeof setup !== 'function') process.exit(1)"
